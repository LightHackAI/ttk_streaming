{% extends 'player/base.html' %}
{% load static %}

{% block title %}Видеотрансляция{% endblock %}

{% block extra_css %}
<style>
    .webcam-container {
        max-width: 1200px;
        margin: 0 auto;
    }
    
    .video-section {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        margin-bottom: 30px;
    }
    
    .video-box {
        background: black;
        border-radius: 16px;
        overflow: hidden;
        aspect-ratio: 16/9;
    }
    
    .video-box video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    
    .controls {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
    }
    
    .cam-btn {
        padding: 12px 24px;
        border-radius: 40px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: all 0.3s;
    }
    
    .cam-start {
        background: #10b981;
        color: white;
    }
    
    .cam-stop {
        background: #ef4444;
        color: white;
    }
    
    .status-text {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        color: #64748b;
    }
</style>
{% endblock %}

{% block content %}
<div class="webcam-container">
    <div class="host-card">
        <div class="host-card-header">
            <h2>📹 Видеотрансляция</h2>
        </div>
        <div class="host-card-body">
            <div class="video-section">
                <div class="video-box">
                    <video id="localVideo" autoplay muted playsinline></video>
                </div>
                <div class="video-box">
                    <video id="remoteVideo" autoplay playsinline></video>
                </div>
            </div>
            
            <div class="controls">
                <button class="cam-btn cam-start" id="startCamBtn" onclick="startWebcam()">🎥 Включить камеру</button>
                <button class="cam-btn cam-stop" id="stopCamBtn" onclick="stopWebcam()" style="display:none;">⏹️ Выключить камеру</button>
                <button class="cam-btn cam-start" id="startStreamBtn" onclick="startStreaming()">📡 Начать трансляцию</button>
                <button class="cam-btn cam-stop" id="stopStreamBtn" onclick="stopStreaming()" style="display:none;">⏹️ Остановить трансляцию</button>
            </div>
            
            <div class="status-text" id="statusText">Статус: готов к трансляции</div>
        </div>
    </div>
</div>

<script>
let localStream = null;
let peerConnection = null;
let isStreaming = false;

const config = {
    iceServers: [
        { urls: 'stun:stun.l.google.com:19302' }
    ]
};

async function startWebcam() {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('startCamBtn').style.display = 'none';
        document.getElementById('stopCamBtn').style.display = 'inline-block';
        document.getElementById('statusText').textContent = 'Статус: камера включена';
    } catch (err) {
        alert('Не удалось получить доступ к камере и микрофону');
        console.error(err);
    }
}

function stopWebcam() {
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        document.getElementById('localVideo').srcObject = null;
        document.getElementById('startCamBtn').style.display = 'inline-block';
        document.getElementById('stopCamBtn').style.display = 'none';
        document.getElementById('statusText').textContent = 'Статус: камера выключена';
        localStream = null;
    }
}

async function startStreaming() {
    if (!localStream) {
        alert('Сначала включите камеру');
        return;
    }
    
    isStreaming = true;
    document.getElementById('startStreamBtn').style.display = 'none';
    document.getElementById('stopStreamBtn').style.display = 'inline-block';
    document.getElementById('statusText').textContent = 'Статус: трансляция активна';
    
    // WebSocket подключение для передачи видео
    const ws = new WebSocket(`ws://${window.location.host}/ws/broadcast/`);
    
    peerConnection = new RTCPeerConnection(config);
    
    localStream.getTracks().forEach(track => {
        peerConnection.addTrack(track, localStream);
    });
    
    peerConnection.ontrack = (event) => {
        document.getElementById('remoteVideo').srcObject = event.streams[0];
    };
    
    peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
            ws.send(JSON.stringify({
                type: 'candidate',
                candidate: event.candidate
            }));
        }
    };
    
    ws.onmessage = async (message) => {
        const data = JSON.parse(message.data);
        
        if (data.type === 'offer') {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            ws.send(JSON.stringify({
                type: 'answer',
                answer: answer
            }));
        } else if (data.type === 'candidate') {
            await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
        }
    };
    
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    ws.send(JSON.stringify({
        type: 'offer',
        offer: offer
    }));
}

function stopStreaming() {
    if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
    }
    
    isStreaming = false;
    document.getElementById('startStreamBtn').style.display = 'inline-block';
    document.getElementById('stopStreamBtn').style.display = 'none';
    document.getElementById('statusText').textContent = 'Статус: трансляция остановлена';
    document.getElementById('remoteVideo').srcObject = null;
}
</script>
{% endblock %}
